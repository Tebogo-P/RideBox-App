<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | RIDEBOX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .container { max-width: 500px; }
        h1 { font-size: 6rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; }
        p { font-size: 1rem; text-transform: uppercase; letter-spacing: 4px; opacity: 0.8; margin-bottom: 40px; }
        a { display: inline-block; color: #000; background: #fff; padding: 15px 40px; text-decoration: none; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; transition: all 0.3s; }
        a:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
